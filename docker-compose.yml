version: "3.9"

services:
  # ── Qdrant Vector DB ──────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: sahara-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  # ── PostgreSQL ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sahara-postgres
    environment:
      POSTGRES_USER: sahara
      POSTGRES_PASSWORD: sahara
      POSTGRES_DB: saharadb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sahara -d saharadb"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── FastAPI Backend ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sahara-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - POSTGRES_URL=postgresql+asyncpg://sahara:sahara@postgres:5432/saharadb
      - KB_PATH=/data/kb.jsonl
    volumes:
      - ./data:/data:ro
      - ./backend/app:/app/app:ro
    depends_on:
      qdrant:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: on-failure

  # ── Next.js Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sahara-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: on-failure

  # ── Prometheus ────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: sahara-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
    depends_on:
      - backend

volumes:
  qdrant_storage:
  postgres_data:
  prometheus_data:
